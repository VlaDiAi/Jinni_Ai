<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS</title>
    <style>
        body { background: #050b14; color: #00f0ff; font-family: monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .panel { border: 2px solid #00f0ff; padding: 20px; border-radius: 10px; background: rgba(0,0,0,0.8); width: 100%; max-width: 500px; text-align: center; }
        h1 { font-size: 18px; letter-spacing: 2px; margin-bottom: 20px; text-shadow: 0 0 10px #00f0ff; }
        .arc-btn { background: #005577; border: 2px solid #fff; color: #fff; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 20px; margin-bottom: 15px; }
        .recording { background: #ff0055; }
        .status { margin-bottom: 15px; font-size: 12px; color: #88aadd; }
        .chat-log { border: 1px solid #00f0ff; height: 200px; overflow-y: auto; text-align: left; padding: 10px; margin-bottom: 15px; font-size: 13px; }
        .input-area { display: flex; gap: 5px; }
        .text-input { flex: 1; background: #000; border: 1px solid #00f0ff; color: #00f0ff; padding: 10px; }
        .file-label { background: #003344; border: 1px solid #00f0ff; padding: 10px; cursor: pointer; }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>ДЖАРВИС</h1>
        <button id="voiceBtn" class="arc-btn">АКТИВИРОВАТЬ ГОЛОС</button>
        <div id="status" class="status">● Ядро онлайн</div>
        <div id="chatLog" class="chat-log">
            <div class="message">Привет, Влад. Готов к анализу смет.</div>
        </div>
        <div class="input-area">
            <label for="fileInput" class="file-label">📎</label>
            <input type="file" id="fileInput" accept="*/*">
            <input type="text" id="textInput" class="text-input" placeholder="Директива...">
        </div>
    </div>
</body>
</html>
    <audio id="remoteAudio" autoplay></audio>

    <script>
        const voiceBtn = document.getElementById('voiceBtn');
        const statusText = document.getElementById('status');
        const chatLog = document.getElementById('chatLog');
        const textInput = document.getElementById('textInput');
        const fileInput = document.getElementById('fileInput');
        const remoteAudio = document.getElementById('remoteAudio');
        
        let isSending = false, attachedFileBase64 = null, attachedFileName = null;
        let localStream = null, peerConnection = null, isVoiceActive = false;

        fileInput.onchange = () => {
            if (fileInput.files && fileInput.files[0]) {
                const file = fileInput.files[0];
                attachedFileName = file.name;
                const reader = new FileReader();
                reader.onloadend = () => {
                    attachedFileBase64 = reader.result;
                    statusText.innerText = `📎 ${file.name} готов.`;
                };
                reader.readAsDataURL(file);
            }
        };

        function appendMsg(txt, sender) {
            const div = document.createElement('div');
            div.style.color = sender === 'user' ? '#e1e1e1' : '#00f0ff';
            div.style.marginTop = '5px';
            div.innerText = (sender === 'user' ? 'Сэр: ' : 'Джинни: ') + txt;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function sendCmd(txt) {
            if (isSending) return;
            isSending = true; statusText.innerText = "● Думаю...";
            try {
                const res = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: txt, file_data: attachedFileBase64, file_name: attachedFileName })
                });
                const data = await res.json();
                appendMsg(data.reply, 'jinni');
            } catch {
                appendMsg("Ошибка соединения.", "jinni");
            } finally {
                isSending = false; attachedFileBase64 = null; attachedFileName = null;
                statusText.innerText = "● Ядро онлайн";
            }
        }

        textInput.onkeydown = (e) => {
            if (e.key === 'Enter' && textInput.value.trim()) {
                appendMsg(textInput.value, 'user');
                sendCmd(textInput.value);
                textInput.value = "";
            }
        };

        async function startVoice() {
            try {
                statusText.innerText = "Подключение звука...";
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:://google.com' }] });
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                peerConnection.ontrack = (e) => remoteAudio.srcObject = e.streams[0];
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                const res = await fetch('/api/rtc-connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sdp: offer.sdp, type: 'offer' })
                });
                const data = await res.json();
                await peerConnection.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: data.sdp }));

                isVoiceActive = true; voiceBtn.innerText = "ОТКЛЮЧИТЬ ГОЛОС";
                voiceBtn.classList.add('recording'); statusText.innerText = "● Говорите...";
            } catch {
                statusText.innerText = "Ошибка аудио."; stopVoice();
            }
        }

        function stopVoice() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (peerConnection) peerConnection.close();
            localStream = null; peerConnection = null; isVoiceActive = false;
            voiceBtn.innerText = "АКТИВИРОВАТЬ ГОЛОС"; voiceBtn.classList.remove('recording');
            statusText.innerText = "● Ядро онлайн";
        }

        voiceBtn.onclick = () => !isVoiceActive ? startVoice() : stopVoice();
    </script>
