<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления Джинни</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #050b14; color: #00f0ff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .panel { border: 2px solid #00f0ff; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,240,255,0.3); background: rgba(5, 11, 20, 0.9); width: 100%; max-width: 600px; text-align: center; }
        h1 { font-size: 20px; letter-spacing: 3px; margin-bottom: 25px; text-shadow: 0 0 10px #00f0ff; }
        .arc-btn { background: #005577; border: 2px solid #fff; color: #fff; padding: 15px 35px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 30px; box-shadow: 0 0 15px #00f0ff; margin-bottom: 15px; transition: all 0.3s ease; outline: none; }
        .recording { background: #ff0055 !important; box-shadow: 0 0 30px #ff0055 !important; }
        .status { margin-bottom: 15px; font-size: 13px; color: #88aadd; }
        .chat-log { border: 1px solid rgba(0, 240, 255, 0.3); background: rgba(0, 5, 10, 0.6); border-radius: 8px; height: 250px; overflow-y: auto; text-align: left; padding: 15px; margin-bottom: 15px; }
        .message { margin-bottom: 12px; line-height: 1.4; font-size: 13px; }
        .msg-user { color: #e1e1e1; }
        .msg-user::before { content: "Сэр> "; color: #88aadd; font-weight: bold; }
        .msg-jinni { color: #00f0ff; }
        .msg-jinni::before { content: "Джинни> "; color: #00f0ff; font-weight: bold; }
        .input-area { display: flex; gap: 10px; align-items: center; width: 100%; }
        .text-input { flex: 1; background: rgba(0, 5, 10, 0.8); border: 1px solid rgba(0, 242, 255, 0.5); border-radius: 5px; padding: 12px; color: #00f0ff; font-family: monospace; outline: none; }
        .text-input:focus { border-color: #00f0ff; box-shadow: 0 0 10px rgba(0,240,245,0.3); }
        .file-label { background: #003344; border: 1px solid #00f0ff; color: #00f0ff; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 16px; user-select: none; }
        #fileInput { display: none; }
        .preview-box { display: none; margin-bottom: 10px; text-align: left; border: 1px dashed #00f0ff; padding: 10px; border-radius: 5px; position: relative; background: rgba(0, 30, 50, 0.4); width: 100%; box-sizing: border-box; }
        .file-info { font-size: 12px; color: #e1e1e1; display: flex; align-items: center; gap: 10px; }
        .cancel-img { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #ff0055; cursor: pointer; font-weight: bold; font-size: 12px; user-select: none; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>ПАНЕЛЬ УПРАВЛЕНИЯ «ДЖИННИ»</h1>
        <button id="voiceBtn" class="arc-btn">🎙️ АКТИВИРОВАТЬ ГОЛОС</button>
        <div id="status" class="status">Система готова, сэр...</div>
        <div id="chatLog" class="chat-log">
            <div class="message msg-jinni">Когнитивный комплекс Джарвис активен. Готов к анализу таблиц Excel, смет в PDF, изображений и текстовых директив.</div>
        </div>
        <div id="previewBox" class="preview-box">
            <div class="file-info">
                <span id="fileIcon" style="font-size: 16px;">📄</span>
                <span id="fileNameText">document.pdf</span>
            </div>
            <span id="cancelImg" class="cancel-img">❌ УДАЛИТЬ</span>
        </div>
        <div class="input-area">
            <label for="fileInput" class="file-label">📎</label>
            <input type="file" id="fileInput" accept="image/*,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/plain">
            <input type="text" id="textInput" class="text-input" placeholder="Введите директиву вручную и нажмите Enter...">
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const voiceBtn = document.getElementById('voiceBtn');
        const statusText = document.getElementById('status');
        const chatLog = document.getElementById('chatLog');
        const textInput = document.getElementById('textInput');
        const fileInput = document.getElementById('fileInput');
        const previewBox = document.getElementById('previewBox');
        const fileNameText = document.getElementById('fileNameText');
        const fileIcon = document.getElementById('fileIcon');
        const cancelImg = document.getElementById('cancelImg');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        let isSending = false; 
        let attachedFileBase64 = null; 
        let attachedFileName = null;

        fileInput.onchange = () => {
            if (fileInput.files && fileInput.files[0]) {
                const file = fileInput.files[0];
                attachedFileName = file.name;
                const ext = file.name.split('.').pop().toLowerCase();
                if (['xlsx', 'xls'].includes(ext)) fileIcon.innerText = "📊 Excel";
                else if (ext === 'pdf') fileIcon.innerText = "📕 PDF";
                else if (['png', 'jpg', 'jpeg', 'webp'].includes(ext)) fileIcon.innerText = "🖼️ Фото";
                else fileIcon.innerText = "📄 Файл";
                
                const reader = new FileReader();
                reader.onloadend = () => {
                    attachedFileBase64 = reader.result;
                    fileNameText.innerText = file.name;
                    previewBox.style.display = 'block';
                    statusText.innerText = `Файл ${file.name} прикреплен.`;
                };
                reader.readAsDataURL(file);
            }
        };

        cancelImg.onclick = () => {
            attachedFileBase64 = null; attachedFileName = null; fileInput.value = ""; previewBox.style.display = 'none'; statusText.innerText = "Файл удален.";
        };

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message msg-${sender}`;
            msgDiv.innerText = text;
            chatLog.appendChild(msgDiv);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                try {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'ru-RU';
                    window.speechSynthesis.speak(u);
                } catch (e) {
                    console.error("Сбой аудио-компонента речи:", e);
                }
            }
        }

        async function executeCommand(text, fileData, fileName, inputType) {
            if (isSending) return;
            isSending = true;
            statusText.innerText = "Джинни обрабатывает директиву...";

            try {
                const response = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        command: text,
                        file_data: fileData,
                        file_name: fileName,
                        input_type: inputType
                    })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    appendMessage(data.reply, 'jinni');
                    speak(data.reply);
                    statusText.innerText = "Ядро активно | Система готова.";
                } else {
                    appendMessage(`Ошибка: ${data.reply}`, 'jinni');
                    statusText.innerText = "Сбой обработки.";
                }
            } catch (err) {
                appendMessage("Критический сбой связи с ядрами.", "jinni");
                statusText.innerText = "🔴 Сбой связи";
            } finally {
                isSending = false;
                // Очищаем прикрепленный файл после успешной отправки
                attachedFileBase64 = null; attachedFileName = null; fileInput.value = ""; previewBox.style.display = 'none';
            }
        }

        textInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !isSending) {
                const text = textInput.value.trim();
                if (text || attachedFileBase64) {
                    let displayMsg = text; if (attachedFileName) displayMsg += ` [Файл: ${attachedFileName}]`;
                    appendMessage(displayMsg, 'user'); 
                    executeCommand(text, attachedFileBase64, attachedFileName, "text"); 
                    textInput.value = "";
                }
            }
        };

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition(); 
            recognition.lang = 'ru-RU';
            recognition.continuous = false;
            recognition.interimResults = false;

            voiceBtn.onclick = () => {
                if (voiceBtn.classList.contains('recording')) { recognition.stop(); }
                else {
                    try { recognition.start(); statusText.innerText = "Слушаю вас, сэр..."; voiceBtn.classList.add('recording'); isSending = false; } catch (e) { console.error(e); }
                }
            };
            recognition.onresult = (event) => {
                if (isSending) return;
                const resultText = event.results[0][0].transcript; 
                let displayMsg = resultText; if (attachedFileName) displayMsg += ` [Файл: ${attachedFileName}]`;
                appendMessage(displayMsg, 'user'); 
                executeCommand(resultText, attachedFileBase64, attachedFileName, "voice");
            };
            recognition.onerror = (e) => {
                console.error(e);
                voiceBtn.classList.remove('recording');
                statusText.innerText = "Ошибка распознавания голоса.";
            };
        } else {
            // Если браузер не поддерживает SpeechRecognition (например, старый WebKit)
            voiceBtn.style.display = 'none';
            statusText.innerText = "Голосовой ввод не поддерживается.";
        }
    </script>
</body>
</html>
