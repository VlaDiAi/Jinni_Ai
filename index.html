<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Джинни — Центральный Оркестратор</title>
    <style>
        body { background: #050b14; color: #00f0ff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .panel { border: 2px solid #00f0ff; padding: 25px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,240,255,0.3); background: rgba(5, 11, 20, 0.9); width: 100%; max-width: 500px; text-align: center; }
        h1 { margin: 0 0 15px 0; font-size: 1.2rem; }
        .agent-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .agent-btn { background: #001a24; border: 1px solid rgba(0, 240, 255, 0.4); color: #00bfff; padding: 8px 5px; font-size: 11px; border-radius: 5px; cursor: pointer; font-family: monospace; }
        .agent-btn.active { background: #00f0ff; color: #000; box-shadow: 0 0 10px #00f0ff; border-color: #00f0ff; font-weight: bold; }
        .chat-log { border: 1px solid rgba(0, 240, 255, 0.3); background: rgba(0, 5, 10, 0.6); border-radius: 8px; height: 180px; overflow-y: auto; text-align: left; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 6px 8px; border-radius: 4px; max-width: 100%; word-wrap: break-word; }
        .msg.user { background: rgba(0, 191, 255, 0.15); align-self: flex-end; text-align: right; }
        .msg.bot { background: rgba(255, 255, 255, 0.05); align-self: flex-start; }
        .input-area { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .text-input { flex-grow: 1; background: rgba(0, 5, 10, 0.8); border: 1px solid rgba(0, 240, 255, 0.5); border-radius: 5px; padding: 12px; color: #00f0ff; font-family: monospace; outline: none; min-width: 200px; }
        .file-label, .voice-btn { background: #003344; border: 1px solid #00f0ff; color: #00f0ff; padding: 10px 14px; border-radius: 5px; cursor: pointer; font-size: 16px; font-family: monospace; text-align: center; white-space: nowrap; }
        .voice-btn { background: #1a0026; border-color: #ff00cc; color: #ffcc00; }
        #fileInput { display: none; }
        .preview-box { display: none; margin-bottom: 10px; text-align: left; border: 1px dashed #00ffcc; padding: 10px; background: rgba(0, 50, 40, 0.4); font-size: 11px; }
        .download-btn { display: none; margin-top: 15px; background: #00ffcc; color: #000; padding: 12px 25px; border-radius: 5px; font-weight: bold; text-decoration: none; box-shadow: 0 0 15px #00ffcc; width: 100%; box-sizing: border-box; text-align: center; font-family: monospace; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>ЦЕНТРАЛЬНЫЙ ОРКЕСТРАТОР ДЖИННИ</h1>
        <div class="agent-selector">
            <button class="agent-btn active" onclick="setAgent('auto', this)">🤖 АВТО-ИИ</button>
            <button class="agent-btn" onclick="setAgent('smetter', this)">📊 СМЕТЧИК</button>
            <button class="agent-btn" onclick="setAgent('scout', this)">🕵️ РАДАР</button>
            <button class="agent-btn" onclick="setAgent('engineer', this)">📐 ИНЖЕНЕР</button>
            <button class="agent-btn" onclick="setAgent('coder', this)">💻 КОДЕР</button>
            <button class="agent-btn" onclick="setAgent('planner', this)">📅 ПЛАНЕР</button>
        </div>
        <div id="chatLog" class="chat-log">
            <div class="msg bot">Джинни> Комплекс MONOLIT-MOS активен, сэр. Введите директиву или прикрепите замеры.</div>
        </div>
        <div id="previewBox" class="preview-box">
            📦 Файлы в очереди:<div id="fileListNames" style="color:#00ffff;"></div>
        </div>
        <div class="input-area">
            <label for="fileInput" class="file-label">📎 Файл</label>
            <input type="file" id="fileInput" multiple accept=".xlsx, .xls, image/*" style="display:none;" onchange="handleFiles(this)">
            <button id="voiceBtn" class="voice-btn" title="На мобильных открывает выбор медиа (в т.ч. голосовые)" onclick="triggerVoiceOrMedia()">🎤 Голос / Медиа</button>
            <input type="text" id="textInput" class="text-input" placeholder="Директива (Enter)..." onkeydown="if(event.key==='Enter') sendCommand()">
        </div>
        <a id="downloadBtn" class="download-btn" href="/api/download-estimate" download="estimate_batch_monolit.xlsx">📥 СКАЧАТЬ СВОДНУЮ СМЕТУ EXCEL</a>
    </div>

    <script>
        let currentAgent = 'auto';
        const chatLog = document.getElementById('chatLog');
        const fileListNames = document.getElementById('fileListNames');
        const previewBox = document.getElementById('previewBox');
        const downloadBtn = document.getElementById('downloadBtn');
        const fileBase64Array = [];
        const fileNameArray = [];

        function setAgent(agent, btn) {
            currentAgent = agent;
            document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            addMsg(`Джинни> Агент переключён: ${agent.toUpperCase()}`, 'bot');
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function handleFiles(input) {
            const files = Array.from(input.files);
            if (files.length === 0) return;
            fileBase64Array.length = 0;
            fileNameArray.length = 0;
            previewBox.style.display = 'block';
            fileListNames.innerHTML = '';
            files.forEach((file, i) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fileBase64Array[i] = e.target.result.split(',')[1]; // base64 без префикса
                    fileNameArray[i] = file.name;
                    fileListNames.innerHTML += `<div>${file.name}</div>`;
                };
                reader.readAsDataURL(file);
            });
        }

        // Кнопка «Голос» — на мобильных Telegram Web App это просто вызов выбора медиа
        function triggerVoiceOrMedia() {
            // В Telegram Web App нет прямого API для записи голоса, но можно открыть выбор медиа
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.openMediaPicker({
                    onSuccess: (files) => {
                        files.forEach(f => {
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                fileBase64Array.push(e.target.result.split(',')[1]);
                                fileNameArray.push(f.file_unique_id || f.name || 'media');
                                previewBox.style.display = 'block';
                                fileListNames.innerHTML += `<div>${f.name || 'Голосовое/медиа'}</div>`;
                            };
                            if (f.blob) reader.readAsDataURL(f.blob);
                        });
                    },
                    onCancel: () => addMsg('Джинни> Выбор медиа отменён.', 'bot')
                });
            } else {
                // Фоллбэк для обычного браузера: просто открываем стандартный выбор файлов
                document.getElementById('fileInput').click();
            }
        }

        async function sendCommand() {
            const text = document.getElementById('textInput').value.trim();
            if (!text && fileBase64Array.length === 0) {
                addMsg('Джинни> Введите текст или прикрепите файл.', 'bot');
                return;
            }
            const command = `${currentAgent.toUpperCase()}: ${text}`;
            addMsg(`${text}`, 'user');
            document.getElementById('textInput').value = '';

            try {
                const res = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        command: command,
                        file_data_list: fileBase64Array,
                        file_name_list: fileNameArray
                    })
                });
                if (!res.ok) throw new Error('Ошибка сервера');
                const data = await res.json();
                addMsg(data.reply, 'bot');
                if (data.has_estimate) {
                    downloadBtn.style.display = 'block';
                }
            } catch (e) {
                addMsg(`Джинни> ❌ Ошибка: ${e.message}`, 'bot');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
            }
        });
    </script>
</body>
</html>
